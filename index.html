<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Story Ultra 💖</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    overflow-x:hidden;
    overflow-y:auto;
    text-align:center;

    background:linear-gradient(40deg,blue,deeppink,purple,red,blue);
    background-size: 1000% 1000%;
    animation: bgMove 9s ease infinite;
}
#subText{
            white-space: pre-line;
}
#letterText{
white-space: pre-line;
}
#welcomeText::after,
#subText::after{
content: "|";
animation: blink 1s infinite;
}
@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0;}
}   
.envelope {
    position: relative;
    width: 320px;
    height: 220px;
    margin: 120px auto;
    background: #ff4d6d;
    border-radius: 10px;
    cursor: pointer;
    perspective: 1000px;
}

/* flap */
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff758f;
    clip-path: polygon(0 0, 100% 0, 50% 60%);
    transform-origin: top;
    transition: transform 0.8s ease;
    z-index: 2;
}

/* hide letter initially */
.envelope .letterBox {
    top: 30%;
    opacity: 0;
    transform: translateY(60px);
    transition: 0.8s ease;
}

/* open animation */
.envelope.open .flap {
    transform: rotateX(180deg);
}

.envelope.open .letterBox {
    opacity: 1;
    transform: translateY(-40px);
} 
.letterBox::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 20px;
    background: linear-gradient(45deg, #ff4d6d, #ff85a2, #ffc2d1);
    opacity: 0.2;
    filter: blur(20px);
    z-index: -1;
}
.letterBox{
    width: 92vw;
    height: 92vw;
    max-width: 420px;
    max-height: 420px;

    margin: 60px auto;
    border-radius: 20px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);

    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.2);

    display: flex;
    flex-direction: column;

    overflow: hidden;   /* important */
}
.letterTitle {
    font-size: 28px;
    margin-bottom: 20px;
    color: #ff9acb;
}
.letterBox::-webkit-scrollbar{
    display:none;
}
.letterContent{
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    font-size: 18px;
    line-height: 1.8;
    font-family: 'Courier New', cursive;
    white-space: pre-line;
}
.letterScroll{
    flex:1;
    overflow-y:auto;
}

.letterButtons {
    margin-top: 25px;
}

.btn {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}

.btn.love {
    background: linear-gradient(45deg, #ff4d6d, #ff85a2);
    color: white;
}

.btn.sad {
    background: #333;
    color: white;
}

.btn:hover {
    transform: scale(1.1);
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

/* 🌈 SMOOTH FLOW */
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* PAGES */
.page{
    display:none;
    height:100vh;
    padding-top:80px;
}

/* SHOW */
.show{display:block;}

/* 💖 ULTRA GLOW BUTTON */
button{
    padding:12px 20px;
    border:none;
    border-radius:25px;
    background:linear-gradient(40deg,pink,deeppink,hotpink,red,blue);
    color:black;
    margin:10px;
    cursor:pointer;

    box-shadow:0 0 15px pink,0 0 30px deeppink;
    animation:glowBtn 1.2s infinite alternate;
}

@keyframes glowBtn{
    0%{transform:scale(1); box-shadow:0 0 10px pink;}
    100%{transform:scale(1.08); box-shadow:0 0 40px violet;}
}
/* FLOATING ELEMENTS */

.balloon,.bubble,.butterfly,.heart{
    position:absolute;
}

/* ⚡ PERFORMANCE BOOST */
.heart {
    will-change: transform, opacity;
    transform: translateZ(0);
}

/* 🎈 BALLOON */
.balloon{
    width:35px;
    height:50px;
    border-radius:50%;
    animation:up 7s linear infinite;
}

@keyframes up{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-120vh);}
}

/* 🫧 BUBBLE */
.bubble{
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    animation:up 3s linear infinite;
}

/* 💖 FIREWORK */
.p{
    position:absolute;
    width:9px;
    height:9px;
    border-radius:50%;
    animation:boom 6s ease-out forwards;
}

@keyframes boom{
    0%{transform:translate(0,0);opacity:1;}
    100%{transform:translate(var(--x),var(--y));opacity:0;}
}

/* TITLE */
h1,h2{
    text-shadow:0 0 20px pink;
}

/* 💓 HEARTBEAT EFFECT */
h1{
    animation: heartbeat 1.5s infinite;
}

@keyframes heartbeat{
    0%{transform:scale(1);}
    25%{transform:scale(1.05);}
    50%{transform:scale(1);}
    75%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

#heartContainer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    overflow:hidden;
}

.heart6{
    position:absolute;
    color:pink;
    font-size:20px;
    animation: floatHeart 4s linear forwards;
}

@keyframes floatHeart{
    0%{transform:translateY(0) scale(1); opacity:1;}
    100%{transform:translateY(-120vh) scale(1.8); opacity:0;}
}
</style>
</head>

<body>

<script>

/* 🎆 FIREWORKS */
function fire(x,y){
for(let i=0;i<20;i++){
let d=document.createElement("div");
d.className="p";

let a=Math.random()*2*Math.PI;
let r=Math.random()*180;

d.style.left=x+"px";
d.style.top=y+"px";

d.style.setProperty("--x",Math.cos(a)*r+"px");
d.style.setProperty("--y",Math.sin(a)*r+"px");

d.style.background=`hsl(${Math.random()*360},100%,60%)`;

document.body.appendChild(d);
setTimeout(()=>d.remove(),1000);
}
}

/* AUTO FIREWORKS */
function startFireworks(){
    if(fwStarted) return;
    fwStarted = true;

    setInterval(()=>{
        let page2 = document.getElementById("p2").classList.contains("show");
        let page4 = document.getElementById("p4").classList.contains("show");
        let page6 = document.getElementById("p6").classList.contains("show");

            Math.random()*window.innerWidth,
            Math.random()*window.innerHeight/2

/* FLOATING OBJECTS (HEAVY CONTINUOUS) */

function createBalloon(){
if(document.querySelectorAll('.balloon').length > maxItems) return;

let b = document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
b.style.background=`hsl(${Math.random()*360},80%,60%)`;

setTimeout(()=>b.remove(),8000);

function createBubble(){
if(document.querySelectorAll('.bubble').length > maxItems) return;

let bu=document.createElement("div");
bu.className="bubble";
bu.style.left=Math.random()*100+"vw";

document.body.appendChild(bu);
setTimeout(()=>bu.remove(),6000);

function createHeart(){
    if(document.querySelectorAll('.heart').length > maxItems) return;

    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";

    let size = 15 + Math.random()*25;

    h.style.cssText = `
        position:absolute;
        left:${Math.random()*100}vw;
        top:100vh;
        font-size:${size}px;
        opacity:0.9;
        pointer-events:none;
        will-change:transform,opacity;
    `;

    document.body.appendChild(h);

    let drift = (Math.random()*60 - 30);

    h.animate([
        { transform:`translate(0,0) scale(1)`, opacity:1 },
        { transform:`translate(${drift}px,-120vh) scale(1.5)`, opacity:0 }
    ],{
        duration: 4000 + Math.random()*2000,
        easing: "ease-out"
    });

    setTimeout(()=>h.remove(),5000);
}
setInterval(createBalloon, 1500);
setInterval(createBubble, 1800);
setInterval(createHeart, 800);

function startHeartIllusion(){

function openLetter(){

}
